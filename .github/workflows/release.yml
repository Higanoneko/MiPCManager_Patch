name: Build and publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - src/**
      - resources/**
      - assets/**
      - .github/workflows/release.yml

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows release and publish GitHub Release
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cargoToml = Get-Content -Raw Cargo.toml
          $package = [regex]::Match($cargoToml, '(?ms)^\[package\]\s*(.*?)(?=^\[|\z)')
          if (-not $package.Success) {
            throw 'Cargo.toml 中未找到 [package] 段落。'
          }
          $versionMatch = [regex]::Match($package.Groups[1].Value, '(?m)^\s*version\s*=\s*["'']([^"'']+)["'']')
          if (-not $versionMatch.Success) {
            throw 'Cargo.toml 的 [package] 中未找到 version。'
          }

          $releaseVersion = $versionMatch.Groups[1].Value
          if ($releaseVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "当前工作流要求三段式版本号，实际为：$releaseVersion"
          }

          $tag = "v$releaseVersion"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag 已存在；请先在 Cargo.toml 中提升 version 后再发版。"
          }
          gh api "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Tag $tag 已存在；请先在 Cargo.toml 中提升 version 后再发版。"
          }
          $global:LASTEXITCODE = 0

          "version=$releaseVersion" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Cargo.toml version: $releaseVersion"

      - name: Build release binaries
        shell: pwsh
        run: cargo build --release --bin MiPCM_CLI --bin MiPCM_GUI

      - name: Stage release assets
        id: artifact
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $assets = @(
            @{ Source = "target\release\MiPCM_CLI.exe"; Name = "MiPCM_CLI_v$env:VERSION.exe" },
            @{ Source = "target\release\MiPCM_GUI.exe"; Name = "MiPCM_GUI_v$env:VERSION.exe" }
          )

          foreach ($asset in $assets) {
            $source = Join-Path $env:GITHUB_WORKSPACE $asset.Source
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "未找到 Release 产物：$source"
            }
            $dest = Join-Path $outDir $asset.Name
            Copy-Item -LiteralPath $source -Destination $dest -Force
            Write-Host "Release asset: $dest"
          }

          "dir=$outDir" >> $env:GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $previousTag = gh release list --repo $env:GITHUB_REPOSITORY --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          $previousTag = $previousTag | Select-Object -First 1
          if ($previousTag) {
            $previousTag = $previousTag.Trim()
          } else {
            $previousTag = ''
          }

          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("## MiPCManager Patcher $env:RELEASE_VERSION")
          $lines.Add('')
          $lines.Add('### 产物')
          $lines.Add('')
          $lines.Add("- ``MiPCM_CLI_v$env:RELEASE_VERSION.exe``")
          $lines.Add("- ``MiPCM_GUI_v$env:RELEASE_VERSION.exe``")
          $lines.Add('')
          $lines.Add('### 更新日志')
          $lines.Add('')

          if ($previousTag -and $previousTag -ne $env:RELEASE_TAG) {
            $commits = @(git log "$previousTag..HEAD" --pretty=format:'- %s (`%h`)' --no-merges)
          } else {
            $commits = @(git log -20 --pretty=format:'- %s (`%h`)' --no-merges)
          }
          if ($commits.Count -eq 0) {
            $lines.Add('- 无可用提交记录。')
          } else {
            foreach ($commit in $commits) {
              $lines.Add($commit)
            }
          }

          Set-Content -LiteralPath $notesPath -Value $lines -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT
          Get-Content -LiteralPath $notesPath

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ASSET_DIR: ${{ steps.artifact.outputs.dir }}
          NOTES_PATH: ${{ steps.changelog.outputs.path }}
        run: |
          $assets = @(
            (Join-Path $env:ASSET_DIR "MiPCM_CLI_v$env:RELEASE_VERSION.exe"),
            (Join-Path $env:ASSET_DIR "MiPCM_GUI_v$env:RELEASE_VERSION.exe")
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf)) {
              throw "缺少待上传产物：$asset"
            }
          }

          gh release create $env:RELEASE_TAG @assets `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "MiPCManager Patcher $env:RELEASE_VERSION" `
            --notes-file $env:NOTES_PATH

          $releaseUrl = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json url --jq '.url'
          Write-Host "Published: $releaseUrl"
