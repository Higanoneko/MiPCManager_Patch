name: Build and publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - src/**
      - resources/**
      - assets/**
      - .github/workflows/release.yml

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows release and publish GitHub Release
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cargoToml = Get-Content -Raw Cargo.toml
          $package = [regex]::Match($cargoToml, '(?ms)^\[package\]\s*(.*?)(?=^\[|\z)')
          if (-not $package.Success) {
            throw 'Cargo.toml 中未找到 [package] 段落。'
          }
          $versionMatch = [regex]::Match($package.Groups[1].Value, '(?m)^\s*version\s*=\s*["'']([^"'']+)["'']')
          if (-not $versionMatch.Success) {
            throw 'Cargo.toml 的 [package] 中未找到 version。'
          }

          $baseVersion = $versionMatch.Groups[1].Value
          if ($baseVersion -notmatch '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$') {
            throw "当前工作流要求三段式版本号，实际为：$baseVersion"
          }

          function Test-ReleaseOrTagExists([string] $tag) {
            gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
            if ($LASTEXITCODE -eq 0) {
              $global:LASTEXITCODE = 0
              return $true
            }
            gh api "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag" *> $null
            $exists = $LASTEXITCODE -eq 0
            # 不存在是正常的检查结果，不应让本步以 gh 的非零退出码结束。
            $global:LASTEXITCODE = 0
            return $exists
          }

          $releaseVersion = $baseVersion
          while (Test-ReleaseOrTagExists "v$releaseVersion") {
            $patch = [int64]$Matches.patch + 1
            $releaseVersion = "{0}.{1}.{2}" -f $Matches.major, $Matches.minor, $patch
            if ($releaseVersion -notmatch '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$') {
              throw "无法递增版本号：$releaseVersion"
            }
          }

          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "version=$releaseVersion" >> $env:GITHUB_OUTPUT
          "tag=v$releaseVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Cargo.toml version: $baseVersion"
          Write-Host "Release version:    $releaseVersion"

      - name: Build release binaries
        shell: pwsh
        run: cargo build --release --bin mipcm_patch --bin mipcm_gui

      - name: Stage release assets
        id: artifact
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE 'release-assets'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $assets = @(
            @{ Source = 'target\release\mipcm_patch.exe'; Name = 'mipcm_patch.exe' },
            @{ Source = 'target\release\mipcm_gui.exe';   Name = 'mipcm_gui.exe' }
          )

          $paths = [System.Collections.Generic.List[string]]::new()
          foreach ($asset in $assets) {
            $source = Join-Path $env:GITHUB_WORKSPACE $asset.Source
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "未找到 Release 产物：$source"
            }
            $dest = Join-Path $outDir $asset.Name
            Copy-Item -LiteralPath $source -Destination $dest -Force
            $paths.Add($dest)
            Write-Host "Release asset: $dest"
          }

          "dir=$outDir" >> $env:GITHUB_OUTPUT
          "files=$($paths -join `n)" >> $env:GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $previousTag = gh release list --repo $env:GITHUB_REPOSITORY --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          $previousTag = $previousTag | Select-Object -First 1
          if ($previousTag) {
            $previousTag = $previousTag.Trim()
          } else {
            $previousTag = ''
          }

          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("## MiPCManager Patcher $env:RELEASE_VERSION")
          $lines.Add('')
          $lines.Add('### 更新日志')
          $lines.Add('')

          if ($previousTag -and $previousTag -ne $env:RELEASE_TAG) {
            $commits = @(git log "$previousTag..HEAD" --pretty=format:'- %s (`%h`)' --no-merges)
          } else {
            $commits = @(git log -20 --pretty=format:'- %s (`%h`)' --no-merges)
          }
          if ($commits.Count -eq 0) {
            $lines.Add('- 无可用提交记录。')
          } else {
            foreach ($commit in $commits) {
              $lines.Add($commit)
            }
          }

          Set-Content -LiteralPath $notesPath -Value $lines -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT
          Get-Content -LiteralPath $notesPath

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ASSET_DIR: ${{ steps.artifact.outputs.dir }}
          NOTES_PATH: ${{ steps.changelog.outputs.path }}
        run: |
          $assets = @(
            (Join-Path $env:ASSET_DIR 'mipcm_patch.exe'),
            (Join-Path $env:ASSET_DIR 'mipcm_gui.exe')
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf)) {
              throw "缺少待上传产物：$asset"
            }
          }

          gh release create $env:RELEASE_TAG @assets `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "MiPCManager Patcher $env:RELEASE_VERSION" `
            --notes-file $env:NOTES_PATH

          $releaseUrl = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json url --jq '.url'
          Write-Host "Published: $releaseUrl"
